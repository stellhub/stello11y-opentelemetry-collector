name: Tag Build

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            goos: linux
            goarch: amd64
            binary: stello11y-opentelemetry-collector
            package: stello11y-opentelemetry-collector-linux-amd64
            archive: stello11y-opentelemetry-collector-linux-amd64.tar.gz
            archive_type: tar
          - name: windows-amd64
            goos: windows
            goarch: amd64
            binary: stello11y-opentelemetry-collector.exe
            package: stello11y-opentelemetry-collector-windows-amd64
            archive: stello11y-opentelemetry-collector-windows-amd64.zip
            archive_type: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Test
        run: go test ./...

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p "dist/${{ matrix.package }}"
          go build -trimpath -ldflags "-s -w" -o "dist/${{ matrix.package }}/${{ matrix.binary }}" ./cmd
          cp configs/collector.yaml "dist/${{ matrix.package }}/collector.yaml"

      - name: Package build
        run: |
          cd dist
          if [ "${{ matrix.archive_type }}" = "zip" ]; then
            zip -r "${{ matrix.archive }}" "${{ matrix.package }}"
          else
            tar -czf "${{ matrix.archive }}" "${{ matrix.package }}"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
